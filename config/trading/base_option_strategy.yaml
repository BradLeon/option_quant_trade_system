# 风控配置（LIVE 基准值）
#
# 唯一配置源: RiskConfig 从此文件加载
# 策略专属覆盖: config/trading/{strategy_name}.yaml

risk_limits:
  # Signal-Level Limits (AccountRiskGuard)
  max_positions: 20                 # 最大持仓数
  max_margin_utilization: 0.70      # 70% - 超过则禁止入场
  min_cash_reserve_pct: 0.05        # 股票入场最低现金比例
  min_available_margin: 10000       # 期权入场最低可用保证金

  # Order-Level Limits (RiskChecker)
  max_projected_margin_utilization: 0.80  # 80% - 开仓后预估上限
  max_price_deviation_pct: 0.05     # 5%
  max_order_value_pct: 0.10         # 10% of NLV

  # Margin Estimation (IBKR Reg T)
  margin_rate_stock_option: 0.20
  margin_rate_index_option: 0.15
  margin_rate_minimum: 0.10
  margin_safety_buffer: 0.80

  # Daily Limits (DailyTradeTracker)
  daily_limits_enabled: true
  daily_max_open_qty_per_underlying: 5
  daily_max_close_qty_per_underlying: 5
  daily_max_roll_qty_per_underlying: 5
  daily_max_value_pct_per_underlying: 10.0  # 10% of NLV
  daily_max_total_value_pct: 25.0           # 25% of NLV

  # Emergency Thresholds (预留)
  emergency_margin_utilization: 0.85
  emergency_cash_ratio: 0.05

  # Kelly Criterion
  kelly_fraction: 0.25              # 1/4 Kelly - 保守策略

# ============================================================
# 回测模式覆盖 (仅在 BACKTEST 模式下生效)
# ============================================================
backtest_overrides:
  risk_limits:
    kelly_fraction: 0.75                    # 3/4 Kelly (live: 1/4)
