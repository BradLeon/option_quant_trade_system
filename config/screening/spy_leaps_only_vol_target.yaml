# SPY Pure LEAPS + Cash Interest + Vol Target Strategy
# 纯 LEAPS 版本: 所有暴露通过 LEAPS Call delta 控制, 闲置现金按 ^TNX 计息
strategy_types:
  - long_call

leaps_config:
  use_synthetic: true            # Use B-S synthetic option chain (no ThetaData needed)

# 策略参数
leaps_only_vol_target_config:
  rebalance_threshold: 0.05       # 5% delta 即触发再平衡
  min_rebalance_interval: 5       # 5 天冷却
  max_capital_pct: 1.0            # 100% 资金利用
  cash_yield_enabled: true        # 现金利息
  default_risk_free_rate: 0.04    # ^TNX 缺失时 fallback

# 兼容 BacktestExecutor 的最小化筛选配置（直通）
market_filter:
  us_market:
    vix_range: [0, 999]
    term_structure_threshold: 999
    trend_indices:
    - symbol: SPY
      weight: 1.0
    trend_required: any
  hk_market:
    volatility_source: 2800.HK
    iv_calculation: atm_weighted
    iv_range: [0, 999]
    trend_indices:
    - symbol: 2800.HK
      weight: 1.0
    trend_required: any

underlying_filter:
  iv_rank_enabled: false
  iv_hv_enabled: false
  technical:
    enabled: false
  fundamental:
    enabled: false

contract_filter:
  liquidity:
    min_open_interest: 0
    max_bid_ask_spread: 1.0
  metrics:
    expected_roc_enabled: false
    tgr_enabled: false
